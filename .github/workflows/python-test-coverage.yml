name: Python Test Coverage
env:
  UV_CACHE_DIR: /tmp/.uv-cache
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  python-tests-coverage:
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: python
    env:
      UV_PYTHON: '3.10'
    steps:
    - uses: actions/checkout@v5
    - name: Save PR number
      run: |
        echo ${{ github.event.number }} > ./pr_number
    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        version: 0.5.x
        enable-cache: true
        cache-suffix: ${{ runner.os }}-${{ env.UV_PYTHON }}
        cache-dependency-glob: '**/uv.lock'
    - name: Install the project
      run: uv sync --all-extras --dev -U --prerelease=if-necessary-or-explicit
    - name: GARALT debug probe
      run: 'if [ -f pr_number ]; then printf ''GARALT_DBG pr_number content before tests: %s\n'' "$(cat pr_number)"; else echo ''GARALT_DBG pr_number not found before tests''; fi'
      continue-on-error: true
    - name: Test with pytest
      run: uv run --frozen pytest -q --junitxml=pytest.xml --cov=semantic_kernel --cov-report=term-missing:skip-covered --cov-report=xml:python-coverage.xml ./tests/unit
    - name: GARALT debug probe
      run: 'if [ -f pr_number ]; then printf ''GARALT_DBG pr_number content after tests: %s\n'' "$(cat pr_number)"; else echo ''GARALT_DBG pr_number not found after tests''; fi'
      continue-on-error: true
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        path: |
          python/python-coverage.xml
          python/pytest.xml
          python/pr_number
        overwrite: true
        retention-days: 1
        if-no-files-found: error
on:
  pull_request:
    branches:
    - main
    - feature*
    paths:
    - python/semantic_kernel/**
    - python/tests/unit/**
