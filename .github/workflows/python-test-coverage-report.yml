name: Python Test Coverage Report
permissions:
  contents: read
  pull-requests: write
jobs:
  python-test-coverage-report:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    continue-on-error: false
    defaults:
      run:
        working-directory: python
    steps:
    - uses: actions/checkout@v5
    - name: Download coverage report
      uses: actions/download-artifact@v5
      with:
        github-token: ${{ secrets.GH_ACTIONS_PR_WRITE }}
        run-id: ${{ github.event.workflow_run.id }}
        path: ./python
        merge-multiple: true
    - name: Display structure of downloaded files
      run: ls
    - name: GARALT debug probe
      run: 'if [ -f pr_number ]; then printf ''GARALT_DBG pr_number content before injection: %s\n'' "$(cat pr_number)"; else echo ''GARALT_DBG pr_number not found before injection''; fi'
      continue-on-error: true
    - name: Read and set PR number
      run: |
        PR_NUMBER=$(cat pr_number)
        echo "PR number: $PR_NUMBER"
        echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG PR_NUMBER env: %s\n'' "$PR_NUMBER"'
      continue-on-error: true
    - name: Pytest coverage comment
      id: coverageComment
      uses: MishaKav/pytest-coverage-comment@v1.1.57
      with:
        github-token: ${{ secrets.GH_ACTIONS_PR_WRITE }}
        issue-number: ${{ env.PR_NUMBER }}
        pytest-xml-coverage-path: python/python-coverage.xml
        title: Python Test Coverage Report
        badge-title: Python Test Coverage
        junitxml-title: Python Unit Test Overview
        junitxml-path: python/pytest.xml
        default-branch: main
        report-only-changed-files: true
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_run:
    workflows:
    - Python Test Coverage
    types:
    - completed
